# UPDATE repo: to your GitHub username/b2b-solutions-website after pushing to GitHub
backend:
  name: github
  repo: b2bservicesgroup-create/b2b-solutions-website
  branch: main
  auth_scope: repo

media_folder: "public/images"
public_folder: "/images"

collections:
  - name: "blog"
    label: "Blog Posts"
    folder: "src/content/blog"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Publish Date", name: "pubDate", widget: "datetime", format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false }
      - { label: "Author", name: "author", widget: "string", default: "B2B Solutions" }
      - { label: "Category", name: "category", widget: "select", options: ["Bookkeeping", "HR & Payroll", "Admin Support", "Document Creation", "Small Business Tips"] }
      - { label: "Featured Image", name: "image", widget: "image", required: false }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "services"
    label: "Services"
    folder: "src/content/services"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Short Description", name: "description", widget: "text" }
      - { label: "Display Order", name: "order", widget: "number" }
      - { label: "Full Content", name: "body", widget: "markdown" }

  - name: "network"
    label: "Network Partners"
    folder: "src/content/network"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Category Name", name: "category", widget: "string" }
      - { label: "Short Description", name: "description", widget: "text" }
      - { label: "Display Order", name: "order", widget: "number" }
      - { label: "Full Content", name: "body", widget: "markdown" }
